<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чёрно-белая доска</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg: #000000;
            --text: #ffffff;
            --border: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Press Start 2P', system-ui;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--bg);
            border-bottom: 4px solid var(--border);
            padding: 20px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #fff;
        }

        .header-buttons {
            display: flex;
            gap: 15px;
        }

        button {
            background-color: var(--bg);
            color: var(--text);
            border: 3px solid var(--border);
            padding: 12px 20px;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 0 4px var(--bg);
        }

        button:hover {
            background-color: var(--text);
            color: var(--bg);
            box-shadow: 0 0 0 4px var(--text);
        }

        #main {
            flex: 1;
            display: flex;
            gap: 30px;
            padding: 30px;
            overflow-x: auto;
            background-color: var(--bg);
            scrollbar-width: thin;
            scrollbar-color: #fff #000;
        }

        .column {
            background-color: var(--bg);
            border: 4px solid var(--border);
            min-width: 340px;
            max-width: 340px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
            flex-shrink: 0;
        }

        .column-title {
            background: var(--bg);
            color: var(--text);
            font-size: 22px;
            padding: 12px 15px;
            border-bottom: 4px solid var(--border);
            outline: none;
            min-height: 60px;
            text-align: center;
            word-break: break-all;
            box-shadow: inset 0 0 0 3px var(--bg);
        }

        .delete-col-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
            padding: 5px;
            transition: transform 0.2s;
        }

        .delete-col-btn:hover {
            transform: scale(1.3);
            color: #ff0000;
        }

        .add-card-btn {
            align-self: center;
            width: 100%;
            padding: 15px;
            font-size: 18px;
        }

        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .card {
            background-color: var(--bg);
            border: 3px solid var(--border);
            padding: 18px 20px;
            position: relative;
            min-height: 90px;
            box-shadow: 0 0 15px rgba(255,255,255,0.15);
        }

        .card-content {
            background: transparent;
            color: var(--text);
            outline: none;
            min-height: 60px;
            font-family: inherit;
            font-size: 16px;
            line-height: 1.4;
            width: 100%;
            padding-right: 35px;
        }

        .delete-card-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
            line-height: 1;
        }

        .delete-card-btn:hover {
            color: #ff0000;
            transform: rotate(15deg);
        }

        .empty-hint {
            color: #555;
            text-align: center;
            font-size: 14px;
            padding: 40px 20px;
            border: 2px dashed #fff;
        }

        /* Скроллбар */
        #main::-webkit-scrollbar {
            height: 12px;
        }
        #main::-webkit-scrollbar-thumb {
            background: #fff;
            border: 3px solid #000;
        }
    </style>
</head>
<body>

    <header>
        <h1>ЧЁРНО-БЕЛАЯ ДОСКА</h1>
        <div class="header-buttons">
            <button onclick="addColumn()">+ ДОБАВИТЬ СТОЛБИК</button>
            <button onclick="clearAll()">ОЧИСТИТЬ ВСЁ</button>
        </div>
    </header>

    <div id="main"></div>

    <script>
        // Основные функции
        let debounceTimer = null;

        function debounceSave() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(saveBoard, 400);
        }

        // Создание карточки (текстового блока)
        function createCardElement(htmlContent = '') {
            const card = document.createElement('div');
            card.className = 'card';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'card-content';
            contentDiv.contentEditable = true;
            contentDiv.innerHTML = htmlContent || '<br>';
            contentDiv.addEventListener('input', debounceSave);
            contentDiv.addEventListener('blur', debounceSave);

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-card-btn';
            deleteBtn.innerHTML = '❌';
            deleteBtn.onclick = (e) => {
                e.stopImmediatePropagation();
                card.remove();
                saveBoard();
            };

            card.appendChild(contentDiv);
            card.appendChild(deleteBtn);
            return card;
        }

        // Создание столбца
        function createColumnElement(titleText = 'Новый столбик', cardsArray = []) {
            const column = document.createElement('div');
            column.className = 'column';

            // Заголовок столбца
            const title = document.createElement('div');
            title.className = 'column-title';
            title.contentEditable = true;
            title.textContent = titleText;
            title.addEventListener('input', debounceSave);
            title.addEventListener('blur', debounceSave);

            // Кнопка удаления столбца
            const deleteColBtn = document.createElement('button');
            deleteColBtn.className = 'delete-col-btn';
            deleteColBtn.innerHTML = '❌';
            deleteColBtn.onclick = () => {
                if (confirm('Удалить весь столбик?')) {
                    column.remove();
                    saveBoard();
                }
            };

            // Кнопка добавления текста
            const addBtn = document.createElement('button');
            addBtn.className = 'add-card-btn';
            addBtn.textContent = '+ ДОБАВИТЬ ТЕКСТ';
            addBtn.onclick = () => {
                const newCard = createCardElement('');
                cardsContainer.appendChild(newCard);
                newCard.querySelector('.card-content').focus();
                saveBoard();
            };

            // Контейнер для карточек
            const cardsContainer = document.createElement('div');
            cardsContainer.className = 'cards-container';

            // Заполняем сохранёнными карточками
            cardsArray.forEach(content => {
                const card = createCardElement(content);
                cardsContainer.appendChild(card);
            });

            // Собираем столбик
            column.appendChild(title);
            column.appendChild(deleteColBtn);
            column.appendChild(addBtn);
            column.appendChild(cardsContainer);

            return column;
        }

        // Сохранение в localStorage
        function saveBoard() {
            const data = [];
            const main = document.getElementById('main');

            main.querySelectorAll('.column').forEach(col => {
                const titleEl = col.querySelector('.column-title');
                const title = titleEl ? titleEl.textContent.trim() : 'Столбик';

                const cardsData = [];
                col.querySelectorAll('.card').forEach(card => {
                    const content = card.querySelector('.card-content');
                    cardsData.push(content ? content.innerHTML : '');
                });

                data.push({
                    title: title,
                    cards: cardsData
                });
            });

            localStorage.setItem('blackWhiteBoard', JSON.stringify(data));
        }

        // Загрузка с localStorage
        function loadBoard() {
            const main = document.getElementById('main');
            main.innerHTML = '';

            let savedData = [];
            try {
                const raw = localStorage.getItem('blackWhiteBoard');
                if (raw) savedData = JSON.parse(raw);
            } catch (e) {
                console.warn('Ошибка загрузки данных');
            }

            if (savedData.length === 0) {
                // Создаём один пустой столбик при первом запуске
                const firstColumn = createColumnElement('Первый столбик', []);
                main.appendChild(firstColumn);
            } else {
                savedData.forEach(item => {
                    const col = createColumnElement(item.title, item.cards);
                    main.appendChild(col);
                });
            }
        }

        // Добавить новый столбик
        function addColumn() {
            const main = document.getElementById('main');
            const newCol = createColumnElement('Новый столбик', []);
            main.appendChild(newCol);
            saveBoard();
            // Прокручиваем к новому столбцу
            newCol.scrollIntoView({ behavior: 'smooth', inline: 'end' });
        }

        // Полная очистка
        function clearAll() {
            if (confirm('Очистить ВСЮ доску? Данные будут удалены навсегда.')) {
                localStorage.removeItem('blackWhiteBoard');
                loadBoard();
            }
        }

        // Инициализация при загрузке страницы
        window.onload = function() {
            loadBoard();

            // Автосохранение при закрытии вкладки
            window.addEventListener('beforeunload', () => {
                saveBoard();
            });
        };

        // Горячие клавиши
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveBoard();
                const notif = document.createElement('div');
                notif.style = 'position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#fff; color:#000; padding:10px 20px; border:3px solid #000; font-family:inherit;';
                notif.textContent = 'Сохранено!';
                document.body.appendChild(notif);
                setTimeout(() => notif.remove(), 1500);
            }
        });
    </script>
</body>
</html>
